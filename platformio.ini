; FARADAY XRPL USB signer for ESP32-S3 touch LCD reference hardware
[env:esp32-s3-touch-lcd-3p5c]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
board_build.partitions = partitions_faraday_secure.csv
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.sdkconfig_defaults = sdkconfig.defaults

lib_deps =
    lvgl/lvgl@8.4.0
    bblanchon/ArduinoJson@7.4.2

build_flags =
    -std=gnu++17
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -D ARDUINOJSON_POOL_CAPACITY=8192
    -Os

build_unflags =
    -std=gnu++11

build_src_filter =
    +<*>
    -<.git/>
    -<.svn/>

[env:esp32-s3-touch-lcd-3p5c-release]
extends = env:esp32-s3-touch-lcd-3p5c
board_build.sdkconfig_defaults =
    sdkconfig.defaults
    sdkconfig.release.defaults
